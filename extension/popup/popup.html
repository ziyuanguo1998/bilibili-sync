<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <h1>Bilibili Sync</h1>
    <p class="subtitle">和 TA 一起看视频</p>

    <!-- 连接状态指示器 -->
    <div id="status-bar">
      <span id="status-dot" class="dot disconnected"></span>
      <span id="status-text">未连接</span>
    </div>

    <!-- 未加入房间时显示：输入房间ID -->
    <div id="join-section">
      <input
        type="text"
        id="room-input"
        placeholder="输入房间名（任意字符串）"
        maxlength="50"
      />
      <button id="join-btn">加入房间</button>
    </div>

    <!-- 已加入房间时显示：房间信息和退出按钮 -->
    <div id="room-section" class="hidden">
      <div class="room-info">
        <div class="info-row">
          <span class="label">房间：</span>
          <span id="room-name" class="value"></span>
        </div>
        <div class="info-row">
          <span class="label">在线：</span>
          <span id="peer-count" class="value">1</span>
          <span class="label"> 人</span>
        </div>
      </div>
      <!-- 时间偏移量调节 -->
      <div class="offset-section">
        <label class="offset-label">时间偏移量（毫秒）</label>
        <input
          type="range"
          id="offset-slider"
          min="-1000"
          max="1000"
          step="1"
          value="0"
        />
        <div class="offset-value-row">
          <input
            type="number"
            id="offset-input"
            min="-1000"
            max="1000"
            step="1"
            value="0"
          />
          <span class="offset-unit">ms</span>
        </div>
      </div>

      <button id="leave-btn" class="btn-danger">退出房间</button>
    </div>

    <!-- 错误提示 -->
    <div id="error-msg" class="hidden"></div>

    <!-- 设置面板（折叠） -->
    <details class="settings">
      <summary>设置</summary>
      <div class="settings-content">
        <label for="server-url">服务器地址：</label>
        <input
          type="text"
          id="server-url"
          placeholder="ws://localhost:8080"
        />
        <button id="save-settings-btn">保存</button>
      </div>
    </details>
  </div>

  <script src="popup.js"></script>
</body>
</html>
